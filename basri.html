.center-control{

.round-btn{

.toast{

/* محاولة عرض المشغل بشكل أفقي حتى على الهاتف */

  #playerRoot.show .player-wrapper{

.player-controls-hidden .player-bottom{transform:translateY(8px)}
.player-controls-hidden .server-strip{transform:translateY(-8px)}

</style>
</head>

function safe(v, fallback=""){
  return (v === undefined || v === null || v === "") ? fallback : v;
}

function normalizeServers(m){
  const s = m.servers || m.qualities || [];

  if(typeof s === "object") return Object.values(s).filter(x => x && x.url);

}

  return String(str || "")
    .replace(/[٠-٩]/g, d => "٠١٢٣٤٥٦٧٨٩".indexOf(d))
    .replace(/[۰-۹]/g, d => "۰۱۲۳۴۵۶۷۸۹".indexOf(d));
}

function format12Hour(timeValue, dateValue){
  if(!timeValue) return "";
  let raw = toEnglishDigits(String(timeValue)).trim();

  let d = null;
  if(dateValue){
    d = new Date(`${dateValue}T${raw}`);
  }
  if(!d || isNaN(d.getTime())){
    d = new Date(`2000-01-01T${raw}`);
  }
  if(isNaN(d.getTime())){
    const m = raw.match(/(\d{1,2}):(\d{2})/);
    if(!m) return raw;
    let h = parseInt(m[1], 10), min = m[2];
    const suffix = h >= 12 ? "م" : "ص";
    h = h % 12; if(h === 0) h = 12;
    return `${h}:${min} ${suffix}`;
  }
  let h = d.getHours();
  const min = String(d.getMinutes()).padStart(2,"0");
  const suffix = h >= 12 ? "م" : "ص";
  h = h % 12; if(h === 0) h = 12;
  return `${h}:${min} ${suffix}`;
}

function getStatus(m){
  const s = Number(m.status ?? m.match_status ?? 0);
  const statusText = String(m.status_text || m.statusText || "").trim();

  if(statusText.includes("انتهت") || s === 4) return { text:"انتهت", cls:"end", order:3, showScore:true };
  if(statusText.includes("جارية") || statusText.includes("مباشر") || [1,2,3].includes(s)) return { text:"جارية الآن", cls:"live", order:1, showScore:true };

  const d = m.match_date || m.date || "";
  const t = m.match_time || m.time || "";
  if(d && t){
    const mt = new Date(`${d}T${toEnglishDigits(t)}`);
    if(!isNaN(mt.getTime()) && Date.now() >= mt.getTime()) return { text:"جارية الآن", cls:"live", order:1, showScore:true };
  }

  return { text:"لم تبدأ", cls:"soon", order:2, showScore:false };
}

function getScore(m){
  const hs = safe(m.home_scores, safe(m.homeScore, "0"));
  const as = safe(m.away_scores, safe(m.awayScore, "0"));
  return `${hs} - ${as}`;
}

function renderMatch(m){
  const home = getHomeName(m);
  const away = getAwayName(m);
  const homeLogo = getHomeLogo(m) || "https://via.placeholder.com/80?text=H";
  const awayLogo = getAwayLogo(m) || "https://via.placeholder.com/80?text=A";
  const status = getStatus(m);
  const timeText = format12Hour(m.match_time || m.time, m.match_date || m.date);
  const servers = normalizeServers(m);

  const card = document.createElement("div");
  card.className = "match-event";
  card.style.order = status.order;

  card.innerHTML = `
    <div class="match-main">
      <div class="first-team">
        <div class="team-logo"><img src="${homeLogo}" onerror="this.src='https://via.placeholder.com/80?text=H'"></div>
        <div class="team-name">${home}</div>
      </div>

      <div class="match-time">
        ${status.showScore ? `<div class="result-now">${getScore(m)}</div>` : `<div class="match-hour">${timeText}</div>`}
        <div class="match-date ${status.cls}">${status.text}</div>
      </div>

      <div class="left-team">
        <div class="team-logo"><img src="${awayLogo}" onerror="this.src='https://via.placeholder.com/80?text=A'"></div>
        <div class="team-name">${away}</div>
      </div>
    </div>

    <div class="overlay-play">
      <div class="play-icon"><i data-feather="play"></i></div>
    </div>
  `;

  card.onclick = () => {
    if(!servers.length){
      toastMsg("لا يوجد سيرفر لهذه المباراة");
      return;
    }
    openPlayer({
      title: `${home} VS ${away}`,
      servers
    });
  };

  return card;
}

db.ref("matches").on("value", snap => {
  const data = snap.val() || {};
  const list = Object.values(data).filter(m => m && (m.published === true || m.published === "true" || m.isPublished === true || m.home || m.home_name || m.homeName));
  page.innerHTML = "";

  if(!list.length){
    page.innerHTML = `<div class="empty">لا توجد مباريات ظاهرة حالياً</div>`;
    return;
  }

  list.sort((a,b)=>getStatus(a).order - getStatus(b).order);
  list.forEach(m => page.appendChild(renderMatch(m)));
  feather.replace();
});

/* Player */
function detectType(url){
  const u = String(url || "").toLowerCase();
  if(u.includes("#hls") || u.includes(".m3u8")) return "hls";
  if(u.includes(".mpd")) return "dash";
  return "file";
}
function buildProxyUrl(src){
  const params = new URLSearchParams();
  params.set("url", src.url || "");
  if(src.userAgent) params.set("ua", src.userAgent);
  if(src.referer) params.set("ref", src.referer);
  if(src.origin) params.set("origin", src.origin);
  if(String(src.url || "").toLowerCase().includes("#hls")) params.set("type", "hls");
  params.set("_", Date.now().toString());
  return WORKER_BASE + "?" + params.toString();
}
function destroyPlayer(){
  try{ if(hls){ hls.destroy(); hls = null; } }catch(e){}
  try{ if(shakaPlayer){ shakaPlayer.destroy(); shakaPlayer = null; } }catch(e){}
  video.pause();
  video.removeAttribute("src");
  try{ video.load(); }catch(e){}
}
function showError(t,m){
  loading.style.display="none";
  buffer.style.display="none";
  errorTitle.textContent = t;
  errorMsg.textContent = m;
  errorOverlay.style.display="flex";
  feather.replace();
}
function hideError(){ errorOverlay.style.display="none"; }


async function enterLandscapeMode(){
  try{
    if(playerRoot.requestFullscreen) await playerRoot.requestFullscreen();
    else if(playerRoot.webkitRequestFullscreen) await playerRoot.webkitRequestFullscreen();
  }catch(e){}

  try{
    if(screen.orientation && screen.orientation.lock){
      await screen.orientation.lock("landscape");
    }
  }catch(e){}
}

function openPlayer(payload){
  feather.replace();
  currentServers = payload.servers || [];
  currentIndex = 0;
  lastMatchTitle = payload.title || "BSR LIVE";
  playerTitle.textContent = lastMatchTitle;
  playerRoot.classList.add("show");
  showPlayerControls();
  enterLandscapeMode();
  buildServerButtons();
  playServer(0);
}
function closePlayer(){
  destroyPlayer();
  clearTimeout(controlsTimer);
  playerRoot.classList.remove("player-controls-hidden");
  playerRoot.classList.remove("show");
  try{
    if(screen.orientation && screen.orientation.unlock) screen.orientation.unlock();
  }catch(e){}
  try{
    if(document.fullscreenElement) document.exitFullscreen();
    else if(document.webkitFullscreenElement) document.webkitExitFullscreen();
  }catch(e){}
}
document.getElementById("playerBackBtn").onclick = closePlayer;

playerRoot.addEventListener("click", (e)=>{
  const interactive = e.target.closest("button,.server-btn,#progress");
  if(interactive) {
    showPlayerControls();
    return;
  }
  if(playerRoot.classList.contains("player-controls-hidden")) showPlayerControls();
  else hidePlayerControlsNow();
});

playerRoot.addEventListener("mousemove", ()=>{
  if(playerRoot.classList.contains("show")) showPlayerControls();
});


function buildServerButtons(){
  serverStrip.innerHTML = "";
  currentServers.forEach((s,i)=>{
    const b = document.createElement("button");
    b.className = "server-btn" + (i===currentIndex ? " active" : "");
    b.textContent = s.label || `Server ${i+1}`;
    b.onclick = () => { showPlayerControls(); playServer(i); };
    serverStrip.appendChild(b);
  });
}
async function playServer(i, isRetry = false){
  const src = currentServers[i];
  if(!src || !src.url){
    showError("لا يوجد سيرفر", "لا يوجد رابط لهذه المباراة.");
    return;
  }

  if(!isRetry) retryCount = 0;

  currentIndex = i;
  buildServerButtons();
  suppressVideoError = true;
  destroyPlayer();
  setTimeout(()=>{ suppressVideoError = false; }, 900);
  hideError();
  loading.style.display="block";

  const type = detectType(src.url);
  const finalUrl = buildProxyUrl(src);

  try{
    if(type === "dash"){
      shaka.polyfill.installAll();
      if(!shaka.Player.isBrowserSupported()) throw new Error("المتصفح لا يدعم DASH");

      shakaPlayer = new shaka.Player(video);

      shakaPlayer.configure({
        streaming: {
          bufferingGoal: 30,
          rebufferingGoal: 2,
          retryParameters: {
            timeout: 15000,
            maxAttempts: 4,
            baseDelay: 1000,
            backoffFactor: 2,
            fuzzFactor: 0.5
          }
        }
      });

      shakaPlayer.addEventListener("error", () => toastMsg("DASH يحاول الاستمرار..."));
      const ck = parseClearKey(src.drmKey || "");
      if(ck) shakaPlayer.configure({drm:{clearKeys:{[ck.kid]:ck.key}}});

      await shakaPlayer.load(finalUrl);
      await video.play().catch(()=>{});
    } else if(type === "hls"){
      if(video.canPlayType("application/vnd.apple.mpegurl")){
        video.src = finalUrl;
        video.load();
        await video.play().catch(()=>{});
      } else if(window.Hls && Hls.isSupported()){
        hls = new Hls({
          enableWorker: true,
          lowLatencyMode: false,
          liveSyncDurationCount: 5,
          liveMaxLatencyDurationCount: 15,
          maxBufferLength: 60,
          maxMaxBufferLength: 120,
          backBufferLength: 20,
          fragLoadingTimeOut: 20000,
          manifestLoadingTimeOut: 20000,
          levelLoadingTimeOut: 20000,
          fragLoadingMaxRetry: 6,
          manifestLoadingMaxRetry: 6,
          levelLoadingMaxRetry: 6,
          fragLoadingRetryDelay: 1200,
          manifestLoadingRetryDelay: 1200,
          levelLoadingRetryDelay: 1200
        });

        hls.loadSource(finalUrl);
        hls.attachMedia(video);

        hls.on(Hls.Events.ERROR, function(event, data){
          if(!data || !data.fatal) return;

          if(data.type === Hls.ErrorTypes.NETWORK_ERROR){
            try {
              hls.startLoad();
              toastMsg("جاري متابعة البث...");
            } catch(e) {}
            return;
          }

          if(data.type === Hls.ErrorTypes.MEDIA_ERROR){
            try {
              hls.recoverMediaError();
              toastMsg("جاري تصحيح البث...");
            } catch(e) {}
            return;
          }

          // إذا الخطأ قوي، لا نوقف المشغل؛ نعيد الاتصال بنفس السيرفر
          autoRetry("HLS fatal");
        });

        await new Promise((resolve,reject)=>{
          const timer = setTimeout(()=>reject(new Error("انتهت مهلة تحميل القناة")), 22000);
          hls.on(Hls.Events.MANIFEST_PARSED, ()=>{ clearTimeout(timer); resolve(); });
          hls.on(Hls.Events.ERROR, (ev,data)=>{ if(data.fatal && data.details === "manifestLoadError"){ clearTimeout(timer); reject(new Error("فشل تحميل ملف m3u8")); } });
        });

        await video.play().catch(()=>{});
      } else {
        video.src = finalUrl;
        video.load();
        await video.play().catch(()=>{});
      }
    } else {
      video.src = finalUrl;
      video.load();
      await video.play().catch(()=>{});
    }

    loading.style.display="none";
    setPlayIcon();
    toastMsg("تم تشغيل السيرفر");
  }catch(e){
    loading.style.display="none";
    autoRetry(e.message || "فشل التشغيل");
  }
}

function autoRetry(reason){
  retryCount++;
  toastMsg("جاري إعادة الاتصال بالبث...");
  setTimeout(()=>playServer(currentIndex, true), Math.min(4000, 900 + (retryCount % 4) * 700));
}

function parseClearKey(ckString){
  if(!ckString) return null;
  const parts = ckString.split(":");
  if(parts.length !== 2) return null;
  return { kid: parts[0].trim().replace(/-/g,"").toLowerCase(), key: parts[1].trim().replace(/-/g,"").toLowerCase() };
}

function fmt(sec){
  if(!isFinite(sec) || sec < 0) return "00:00";
  const h = Math.floor(sec/3600);
  const m = Math.floor((sec%3600)/60).toString().padStart(2,"0");
  const s = Math.floor(sec%60).toString().padStart(2,"0");
  return h ? `${String(h).padStart(2,"0")}:${m}:${s}` : `${m}:${s}`;
}
function updateProgress(){
  const dur = video.duration;
  const cur = video.currentTime || 0;
  if(dur && isFinite(dur)){
    progressPlayed.style.width = `${(cur/dur)*100}%`;
    playerTime.textContent = `${fmt(cur)} • ${fmt(dur)}`;
  }else{
    progressPlayed.style.width = "100%";
    playerTime.textContent = "LIVE";
  }
}
video.addEventListener("timeupdate", updateProgress);
video.addEventListener("loadedmetadata", updateProgress);
video.addEventListener("waiting", ()=>buffer.style.display="block");
video.addEventListener("playing", ()=>buffer.style.display="none");
video.addEventListener("stalled", ()=>{
  if(hls){
    try { hls.startLoad(); } catch(e){}
  }
});
video.addEventListener("ended", ()=>{
  if(hls){
    try { hls.startLoad(); video.play().catch(()=>{}); } catch(e){}
  }
});

video.addEventListener("error", ()=>{
  if(suppressVideoError) return;

  // لا تعرض شاشة توقف بسرعة، حاول ترجع نفس البث أولاً
  if(hls){
    try {
      hls.startLoad(-1);
      video.play().catch(()=>{});
      toastMsg("جاري متابعة البث...");
      return;
    } catch(e){}
  }

  // إذا كان تشغيل ملف مباشر أو المتصفح هو الذي يشغل HLS، أعد تحميل نفس السيرفر بهدوء
  if(!softRecovering){
    softRecovering = true;
    toastMsg("جاري إعادة الاتصال بالبث...");
    setTimeout(()=>{
      softRecovering = false;
      playServer(currentIndex, true);
    }, 1200);
    return;
  }

  toastMsg("البث يحاول الاستمرار...");
});

progress.onclick = e => {
  const dur = video.duration;
  if(!dur || !isFinite(dur)) return;
  const rect = progress.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  video.currentTime = Math.max(0, Math.min(dur, ratio * dur));
};

function setPlayIcon(){
  document.getElementById("playPauseBtn").innerHTML = `<i data-feather="${video.paused ? "play" : "pause"}"></i>`;
  feather.replace();
}
document.getElementById("playPauseBtn").onclick = async () => {
  showPlayerControls();
  if(video.paused) await video.play().catch(()=>{});
  else video.pause();
  setPlayIcon();
};
video.addEventListener("play", setPlayIcon);
video.addEventListener("pause", setPlayIcon);

document.getElementById("rewindBtn").onclick = () => {
  showPlayerControls();
  if(video.duration && isFinite(video.duration)) video.currentTime = Math.max(0, video.currentTime - 5);
};
document.getElementById("forwardBtn").onclick = () => {
  showPlayerControls();
  if(video.duration && isFinite(video.duration)) video.currentTime = Math.min(video.duration, video.currentTime + 15);
};
document.getElementById("muteBtn").onclick = () => {
  showPlayerControls();
  video.muted = !video.muted;
  document.getElementById("muteBtn").innerHTML = `<i data-feather="${video.muted ? "volume-x" : "volume-2"}"></i>`;
  feather.replace();
};

document.getElementById("fitBtn").onclick = () => {
  showPlayerControls();
  fitIndex = (fitIndex + 1) % fitModes.length;
  video.classList.remove("fit-contain","fit-cover","fit-fill");
  video.classList.add(fitModes[fitIndex].cls);
  document.getElementById("fitBtn").innerHTML = `<i data-feather="${fitModes[fitIndex].icon}"></i>`;
  feather.replace();
  toastMsg("العرض: " + fitModes[fitIndex].label);
};

document.getElementById("rotateBtn").onclick = () => {
  showPlayerControls();
  rotated = !rotated;
  video.style.transform = rotated ? "rotate(90deg) scale(1.02)" : "";
  video.style.transformOrigin = "center center";
  toastMsg(rotated ? "تم تفعيل التدوير" : "تم إيقاف التدوير");
};

document.getElementById("retryBtn").onclick = () => { retryCount = 0; playServer(currentIndex); };

</script>
