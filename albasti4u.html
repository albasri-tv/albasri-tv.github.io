        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox');
        iframe.srcdoc = buildAdFrameHTML(config.key, config.width, config.height);
        container.appendChild(iframe);
    }

    function createIframeAdCard() {
        const wrapper = document.createElement('div');
        wrapper.className = 'ad-grid-card';
        const adBox = document.createElement('div');
        adBox.className = 'ad-box rectangle';
        wrapper.appendChild(adBox);

        const iframe = document.createElement('iframe');
        iframe.width = RECTANGLE_300.width;
        iframe.height = RECTANGLE_300.height;
        iframe.scrolling = 'no';
        iframe.frameBorder = '0';
        iframe.allowTransparency = 'true';
        iframe.style.border = '0';
        iframe.style.overflow = 'hidden';
        iframe.style.background = 'transparent';
        iframe.setAttribute('sandbox', 'allow-scripts allow-same-origin allow-popups allow-popups-to-escape-sandbox');
        iframe.srcdoc = buildAdFrameHTML(RECTANGLE_300.key, RECTANGLE_300.width, RECTANGLE_300.height);
        adBox.appendChild(iframe);
        return wrapper;
    }

    function createSmartImageAdCard(index = 0) {
        const wrapper = document.createElement('div');
        wrapper.className = 'ad-grid-card';
        const img = SMART_AD_IMAGES[index % SMART_AD_IMAGES.length];
        wrapper.innerHTML = `<a class="smart-ad-card" href="${SMART_LINK}" target="_blank" rel="noopener noreferrer"><img src="${img}" alt="إعلان"><span class="smart-ad-badge">إعلان</span><span class="smart-ad-title">شاهد المزيد من المحتوى المميز</span></a>`;
        return wrapper;
    }

    function createImageAdCard(index = 0) {
        // نبدّل بين إعلان iframe وإعلان صورة مباشر حتى يزيد الربح بدون إزعاج المستخدم.
        return index % 2 === 0 ? createIframeAdCard() : createSmartImageAdCard(index);
    }

    function insertImageAds(gridElement, frequency = 4, maxAds = 3) {
        if (!gridElement) return;
        const oldAds = [...gridElement.children].filter(el => el.classList.contains('ad-grid-card'));
        oldAds.forEach(ad => ad.remove());

        const cards = [...gridElement.children].filter(el => !el.classList.contains('ad-grid-card'));
        if (cards.length < frequency) return;

        let inserted = 0;
        for (let i = frequency; i < cards.length && inserted < maxAds; i += frequency) {
            const refCard = cards[i - 1];
            const adCard = createImageAdCard(inserted);
            if (refCard && refCard.nextSibling) gridElement.insertBefore(adCard, refCard.nextSibling);
            else gridElement.appendChild(adCard);
            inserted++;
        }
    }

    function setViewAds(view) {
        const homeTop = document.getElementById('home-top-ad-wrap');
        const homeBottom = document.getElementById('home-bottom-ad-wrap');
        if (homeTop) homeTop.style.display = view === 'home' ? 'flex' : 'none';
        if (homeBottom) homeBottom.style.display = view === 'home' ? 'flex' : 'none';
    }

    function loadStaticAds() {
        // إعلانات خفيفة: بانر واحد أعلى وبانر واحد أسفل لكل صفحة فقط
        ['home-top-banner-ad','home-bottom-banner-ad','section-top-banner-ad','section-bottom-banner-ad','episodes-top-banner-ad','episodes-bottom-banner-ad']
            .forEach(id => renderIframeAd(id, BANNER_320));
    }


    // --- إضافة نظام مراقبة زر الرجوع الذكي ---
    window.onpopstate = function(event) {
        if (event.state) {
            if (event.state.view === 'home') {
                showHome(false);
            } else if (event.state.view === 'section') {
                loadData(event.state.type, event.state.sec, event.state.page, event.state.name, false);
            } else if (event.state.view === 'eps') {
                closePlayer(false);
                document.getElementById('eps-view').style.display = 'block';
                document.getElementById('section-view').style.display = 'none';
                setViewAds('section');
            }
        } else {
            showHome(false);
        }
        // إغلاق المشغل دائماً عند الرجوع إذا كان مفتوحاً
        if (document.getElementById('watch-modal').style.display === 'flex') {
            closePlayer(false);
        }
    };

    function toggleTheme() {
        const html = document.documentElement;
        const icon = document.getElementById('theme-icon');
        if (html.getAttribute('data-theme') === 'dark') {
            html.setAttribute('data-theme', 'light');
            icon.classList.replace('fa-moon', 'fa-sun');
        } else {
            html.setAttribute('data-theme', 'dark');
            icon.classList.replace('fa-sun', 'fa-moon');
        }
    }

    function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.style.display = sidebar.classList.contains('open') ? 'block' : 'none';
    }

    function toggleMobileSearch() { document.getElementById('main-header').classList.toggle('search-active'); }

    const sectionImages = {
        series_29: "https://up6.cc/2026/04/177578061698531.png", series_30: "https://up6.cc/2026/04/177578066558531.png",
        series_31: "https://up6.cc/2026/04/1775780864911.png", series_32: "https://up6.cc/2026/04/177578061707422.png",
        series_33: "https://up6.cc/2026/04/177578091128861.png", movies_29: "https://up6.cc/2026/04/177578141485251.png",
        movies_30: "https://up6.cc/2026/04/177578141491472.png", movies_31: "https://up6.cc/2026/04/177578141497723.png",
        movies_32: "https://up6.cc/2026/04/17757814150724.png", movies_33: "https://up6.cc/2026/04/177578152800671.png"
    };

    function initLauncher() {
        const cats = [
            {id:'29', type:'series', name:'مسلسلات عربية', img:sectionImages.series_29},
            {id:'32', type:'series', name:'مسلسلات تركية', img:sectionImages.series_32},
            {id:'30', type:'series', name:'مسلسلات أجنبية', img:sectionImages.series_30},
            {id:'31', type:'series', name:'مسلسلات هندية', img:sectionImages.series_31},
            {id:'33', type:'series', name:'مسلسلات آسيوية', img:sectionImages.series_33},
            {id:'29', type:'movies', name:'أفلام عربية', img:sectionImages.movies_29},
            {id:'30', type:'movies', name:'أفلام أجنبية', img:sectionImages.movies_30},
            {id:'32', type:'movies', name:'أفلام تركية', img:sectionImages.movies_32},
            {id:'31', type:'movies', name:'أفلام هندية', img:sectionImages.movies_31},
            {id:'33', type:'movies', name:'أفلام آسيوية', img:sectionImages.movies_33}
        ];
        const grid = document.getElementById('home-view');
        grid.innerHTML = '';
        cats.forEach((c, index) => {
            const card = document.createElement('div');
            card.className = 'custom-card';
            card.setAttribute('onclick', `loadData('${c.type}', '${c.id}', 1, '${c.name}')`);
            card.innerHTML = `<div class="card-img" style="background-image: url('${c.img}')"></div><div class="card-play"><i class="fas fa-folder-open"></i></div><div class="card-title">${c.name}</div>`;
            grid.appendChild(card);
        });
        insertImageAds(grid, 3, 3);
        setViewAds('home');
        history.replaceState({view: 'home'}, '');
    }
    initLauncher();

    function showHome(push = true) {
        document.getElementById('home-view').style.display = 'grid';
        document.getElementById('section-view').style.display = 'none';
        document.getElementById('eps-view').style.display = 'none';
        document.getElementById('search-bar').style.display = 'none';
        current.view = 'home';
        setViewAds('home');
        if(push) history.pushState({view: 'home'}, '');
    }

    function loadData(type, sec, page, name = current.name, push = true) {
        current = { type, sec, page, name, view: 'section' }; 
        if(push) history.pushState({view: 'section', type, sec, page, name}, '');

        document.getElementById('home-view').style.display = 'none';
        setViewAds('section');
        document.getElementById('section-view').style.display = 'block';
        document.getElementById('loader').style.display = 'block';
        document.getElementById('items-grid').innerHTML = '';
        document.getElementById('section-title').innerText = name;
        
        fetch(`${API}?action=list&type=${type}&section=${sec}&page=${page}`)
        .then(res => res.json()).then(data => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('search-bar').style.display = 'block';
            if(data.items) {
                data.items.forEach(item => {
                    let icon = type === 'movies' ? 'fa-play' : 'fa-list-ul';
                    document.getElementById('items-grid').innerHTML += `<div class="custom-card movie-item" data-title="${item.title}" onclick="handleSelection('${item.url}', '${item.image}', '${type}', '${item.title}')"><div class="card-img" style="background-image: url('${item.image}')"></div><div class="card-play"><i class="fas ${icon}"></i></div><div class="card-title">${item.title}</div></div>`;
                });
            }
            insertImageAds(document.getElementById('items-grid'), 3, 4);
            renderPagination();
        }).catch(() => { document.getElementById('loader').style.display = 'none'; });
    }

    function renderPagination() {
        const box = document.getElementById('pagination-box');
        let html = '';
        if (current.page > 1) html += `<button class="pag-btn" onclick="loadData('${current.type}', '${current.sec}', ${current.page - 1}, '${current.name}')">السابق</button>`;
        html += `<div class="pag-number">${current.page}</div>`;
        html += `<button class="pag-btn" onclick="loadData('${current.type}', '${current.sec}', ${current.page + 1}, '${current.name}')">التالي</button>`;
        box.innerHTML = html;
    }

    function runSearch() {
        let q = document.getElementById('user-search').value.toLowerCase();
        let items = document.getElementsByClassName('movie-item');
        for (let i of items) i.style.display = i.getAttribute('data-title').toLowerCase().includes(q) ? "flex" : "none";
    }

    function handleSelection(url, image, type, title) {
        if (type === 'movies') { currentPlayUrl = url; openPlayer(title); fetchAndPlay(url); }
        else { loadEpisodes(url, image, title); }
    }

    function loadEpisodes(url, image, title) {
        document.getElementById('loader').style.display = 'block';
        history.pushState({view: 'eps'}, ''); // حفظ حالة صفحة الحلقات

        fetch(`${API}?action=episodes&url=${encodeURIComponent(url)}`)
        .then(res => res.json()).then(data => {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('section-view').style.display = 'none';
            document.getElementById('eps-view').style.display = 'block';
            setViewAds('section');
            document.getElementById('series-title').innerText = title;
            const grid = document.getElementById('episodes-grid'); grid.innerHTML = '';
            
            const episodes = Array.isArray(data) ? data : (data.episodes || []);
            episodes.forEach(ep => {
                grid.innerHTML += `<div class="custom-card" onclick="currentPlayUrl='${ep.url || ep.episode_url}'; openPlayer('${ep.name}'); fetchAndPlay(currentPlayUrl);"><div class="card-img" style="background-image: url('${image}')"></div><div class="card-play"><i class="fas fa-play"></i></div><div class="card-title">${ep.name}</div></div>`;
            });
            insertImageAds(grid, 3, 4);
        }).catch(() => { document.getElementById('loader').style.display = 'none'; });
    }

    function closeEps() { 
        history.back(); // نستخدم التراجع الطبيعي
    }

    function requestPlayerFullscreen() {
        const wrapper = document.querySelector('.player-wrapper');
        if (!wrapper) return;
        const request = wrapper.requestFullscreen || wrapper.webkitRequestFullscreen || wrapper.msRequestFullscreen;
        if (request) {
            try { request.call(wrapper); } catch (e) { /* بعض المتصفحات تمنع ملء الشاشة تلقائياً */ }
        }
    }

    function exitPlayerFullscreen() {
        const exit = document.exitFullscreen || document.webkitExitFullscreen || document.msExitFullscreen;
        if ((document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) && exit) {
            try { exit.call(document); } catch (e) {}
        }
    }
    
    function openPlayer(title) { 
        document.getElementById('watch-modal').style.display = 'flex'; 
        document.getElementById('video-title').innerText = title; 
        document.getElementById('player-loading').style.display = 'flex'; 
        setActiveServer(1); 
        document.body.style.overflow = 'hidden';
        history.pushState({view: 'player'}, ''); // حفظ حالة المشغل
    }


    function setActiveServer(serverNumber) {
        const one = document.getElementById('server-one-btn');
        const two = document.getElementById('server-two-btn');
        if (!one || !two) return;
        one.classList.toggle('active', serverNumber === 1);
        two.classList.toggle('active', serverNumber === 2);
    }

    function playServerOne() {
        setActiveServer(1);
        if (currentPlayUrl) fetchAndPlay(currentPlayUrl);
    }

    function openServerTwoAd() {
        setActiveServer(2);
        window.open(SMART_LINK, '_blank', 'noopener,noreferrer');
        setTimeout(() => setActiveServer(1), 700);
    }

    function fetchAndPlay(url) {
        fetch(`${API}?action=watch&url=${encodeURIComponent(url)}`)
        .then(res => res.json()).then(data => {
            if(data.stream) {
                player.source = { type: 'video', sources: [{ src: data.stream, type: 'video/mp4' }] };
                document.getElementById('player-loading').style.display = 'none';
                document.getElementById('dl-link').href = data.stream;
                player.play();
            }
        });
    }

    function closePlayer(pop = true) { 
        player.pause(); 
        document.getElementById('watch-modal').style.display = 'none'; 
        player.source = { type: 'video', sources: [] }; 
        document.body.style.overflow = 'auto';
        if(pop) history.back();
    }
    window.addEventListener('load', loadStaticAds);
</script>
