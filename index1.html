<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البصري تي في - البث المباشر</title>
    <style>
        :root{--bg:#0b1220;--card:#1e293b;--text:#fff;--primary:#38bdf8}
        body{background:var(--bg); color:var(--text); font-family:tahoma; padding:15px; margin:0;}
        .container{max-width:600px; margin:auto;}
        .match-item{background:var(--card); border-radius:15px; padding:15px; margin-bottom:15px; display:flex; justify-content:space-between; align-items:center; border:1px solid rgba(255,255,255,0.1); cursor:pointer;}
        .team{text-align:center; width:40%;}
        .team img{width:50px; height:50px; object-fit:contain; margin-bottom:5px; background:#fff; border-radius:50%; padding:3px;}
        .vs{color:var(--primary); font-weight:bold;}
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center;">مباريات جارية الآن</h2>
    <div id="matches-container">جاري جلب المباريات المباشرة...</div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAGhmOqXWxmr2ULOzNMMDuLlxCeTmUNpis",
        databaseURL: "https://frsin-araq-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    db.ref('live_matches').on('value', (snapshot) => {
        const container = document.getElementById('matches-container');
        container.innerHTML = '';
        const data = snapshot.val();

        if (data) {
            Object.values(data).forEach(m => {
                const payload = encodeURIComponent(JSON.stringify({
                    title: m.home + " vs " + m.away,
                    qualities: m.servers
                }));
                
                container.innerHTML += `
                    <div class="match-item" onclick="window.location.href='player.html?data=${payload}'">
                        <div class="team"><img src="${m.imgH}"><div>${m.home}</div></div>
                        <div class="vs">LIVE</div>
                        <div class="team"><img src="${m.imgA}"><div>${m.away}</div></div>
                    </div>`;
            });
        } else {
            container.innerHTML = '<p style="text-align:center; color:#94a3b8;">لا توجد مباريات منشورة حالياً</p>';
        }
    });
</script>
</body>
</html>
