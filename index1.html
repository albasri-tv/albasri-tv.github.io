<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>البصري تي في - المباريات المباشرة</title>
    <style>
        :root{--bg:#0b1220;--card:rgba(17,24,39,.88);--line:rgba(255,255,255,.08);--text:#fff;--primary:#38bdf8}
        body{margin:0;padding:16px;color:var(--text);font-family:Tahoma,sans-serif;background:var(--bg)}
        .container{max-width:860px;margin:auto}
        .match-card{background:linear-gradient(180deg, rgba(30,41,59,.96), rgba(15,23,42,.96));border:1px solid var(--line);border-radius:22px;padding:20px;margin-bottom:15px;cursor:pointer;transition:0.3s}
        .match-card:hover{transform:translateY(-3px);border-color:var(--primary)}
        .match-head{display:flex;align-items:center;justify-content:space-between}
        .team{width:35%;text-align:center}.team img{width:65px;height:65px}
        .center{width:30%;text-align:center}.score{font-size:1.8rem;font-weight:900;color:var(--primary)}
        .live-dot{width:10px;height:10px;background:#ef4444;border-radius:50%;display:inline-block;margin-left:5px;animation:blink 1s infinite}
        @keyframes blink{0%{opacity:1}50%{opacity:0.3}100%{opacity:1}}
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; margin-bottom:25px">مباريات اليوم المباشرة</h2>
    <div id="live-container">
        </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAGhmOqXWxmr2ULOzNMMDuLlxCeTmUNpis",
        databaseURL: "https://frsin-araq-default-rtdb.firebaseio.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // الاستماع الفوري للمباريات المرسلة من المسؤول
    db.ref('live_matches').on('value', (snapshot) => {
        const data = snapshot.val();
        const container = document.getElementById('live-container');
        container.innerHTML = '';
        
        if(!data) {
            container.innerHTML = '<div style="text-align:center; opacity:0.5">لا توجد مباريات منقولة حالياً</div>';
            return;
        }

        for(let id in data) {
            const m = data[id];
            container.innerHTML += `
                <div class="match-card" onclick="location.href='player.html?url=${btoa(m.url)}'">
                    <div class="match-head">
                        <div class="team"><img src="https://imgs.ysscores.com/teams/64/${m.imgH}"><div>${m.home}</div></div>
                        <div class="center">
                            <div class="score">VS</div>
                            <div style="font-size:12px; font-weight:bold; color:#ef4444"><span class="live-dot"></span>مباشر</div>
                        </div>
                        <div class="team"><img src="https://imgs.ysscores.com/teams/64/${m.imgA}"><div>${m.away}</div></div>
                    </div>
                </div>`;
        }
    });
</script>
</body>
</html>
