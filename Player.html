<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Exo Style Player Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/feather-icons/dist/feather.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.13/shaka-player.compiled.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <meta name="referrer" content="no-referrer" />
  <style>
    :root{--bar-bg: rgba(0,0,0,.55);}
    *{box-sizing:border-box;user-select:none;-webkit-tap-highlight-color: transparent}
    html,body{margin:0;padding:0;width:100%;height:100%;background:#000;font-family:'Tajawal', sans-serif;overflow:hidden}
    #player-root{position:fixed;inset:0;background:#000}
    .player-wrapper{position:relative;width:100%;height:100%;background:#000;overflow:hidden}
    video{width:100%;height:100%;background:#000;object-fit:fill;filter:contrast(1.06) saturate(1.12);transition:transform .25s ease}
    video.fit-contain{object-fit:contain!important} video.fit-cover{object-fit:cover!important} video.fit-fill{object-fit:fill!important}
    #loading-spinner,#buffer-spinner{position:absolute;z-index:55;top:50%;left:50%;transform:translate(-50%,-50%);border-radius:50%;animation:spin 1s linear infinite;display:none;pointer-events:none}
    #loading-spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.2);border-top-color:#fff}
    #buffer-spinner{width:92px;height:92px;border:6px solid rgba(255,255,255,.25);border-top-color:#fff}
    @keyframes spin{to{transform:translate(-50%,-50%) rotate(360deg)}}
    #error-overlay{position:absolute;inset:0;z-index:9999;background:rgba(0,0,0,.92);color:#fff;display:none;flex-direction:column;align-items:center;justify-content:center;padding:20px;text-align:center;gap:12px}
    .retry-btn{border:none;background:#fff;color:#000;font-family:'Tajawal',sans-serif;font-weight:700;padding:10px 14px;border-radius:999px;cursor:pointer}
    .controls-overlay{position:absolute;inset:0;pointer-events:none}
    .top-bar{position:absolute;top:0;left:0;right:0;z-index:70;padding:12px 14px;background:linear-gradient(to bottom, rgba(0,0,0,.78), rgba(0,0,0,0));opacity:0;transform:translateY(-6px);transition:.25s;pointer-events:auto}
    .top-bar.visible{opacity:1;transform:translateY(0)}
    .top-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
    .top-left{display:flex;align-items:flex-start;gap:10px;flex:1;justify-content:space-between}
    .top-btn{width:42px;height:42px;border:none;border-radius:14px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;box-shadow:0 10px 25px rgba(0,0,0,.28)}
    .top-btn i{color:#fff;width:20px;height:20px}
    .stream-title{color:#fff;font-size:15px;font-weight:600;opacity:.95;max-width:34vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .server-strip{display:flex;gap:8px;flex-wrap:wrap;justify-content:flex-start;direction:ltr;align-items:center;margin-left:auto}
    .server-btn{border:none;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);color:#fff;padding:8px 12px;border-radius:999px;font-family:'Tajawal',sans-serif;font-weight:700;font-size:12px;cursor:pointer;backdrop-filter:blur(14px)}
    .server-btn.active{background:#fff;color:#000}
    .center-transport{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);display:flex;align-items:center;gap:22px;pointer-events:auto;opacity:0;transition:opacity .2s}
    .center-transport.visible{opacity:1}
    .circle-btn.big,.circle-btn.seek-btn{border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);color:#fff;box-shadow:0 16px 38px rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center;cursor:pointer}
    .circle-btn.big{width:74px;height:74px}.circle-btn.seek-btn{width:60px;height:60px}
    .circle-btn.big i{width:32px;height:32px}.circle-btn.seek-btn i{width:22px;height:22px}
    .seek-badge{position:relative;width:60px;height:60px}.seek-badge .num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:800;pointer-events:none;transform:translateY(1px)}
    .seek-badge i{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%)}
    .bottom-bar{position:absolute;left:0;right:0;bottom:0;pointer-events:auto;padding:12px 14px 14px;background:linear-gradient(to top, rgba(0,0,0,.78), rgba(0,0,0,.18), rgba(0,0,0,0));opacity:0;transform:translateY(6px);transition:opacity .22s, transform .22s}
    .bottom-bar.visible{opacity:1;transform:translateY(0)}
    .progress-row{display:flex;align-items:center;gap:10px;margin-bottom:10px}
    .progress-wrapper{flex:1;height:5px;border-radius:999px;background:rgba(255,255,255,.22);overflow:hidden;cursor:pointer;position:relative}
    .progress-played{position:absolute;left:0;top:0;bottom:0;width:0%;background:#fff}
    .progress-thumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:12px;height:12px;border-radius:50%;background:#fff;left:0%;box-shadow:0 0 10px rgba(255,255,255,.35)}
    .controls-row{display:flex;align-items:center;justify-content:space-between;gap:12px}
    .icons-row{display:flex;align-items:center;gap:12px;justify-content:flex-end;direction:ltr;min-width:0;width:100%;flex-wrap:nowrap}
    .time-text{color:#fff;font-size:15px;font-weight:500;min-width:120px;text-align:left;direction:ltr;opacity:.92;margin-left:auto}
    .icon-btn{width:40px;height:40px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.14);border-radius:12px;padding:0;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#fff;backdrop-filter:blur(10px)}
    .icon-btn i{width:20px;height:20px;color:#fff}
    .live-task{display:none;align-items:center;gap:6px;padding:7px 10px;border-radius:999px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);backdrop-filter:blur(14px);color:#fff;font-weight:800;font-size:13px;min-width:110px;justify-content:center}
    .live-task .dot{width:7px;height:7px;border-radius:50%;background:#ff2b2b;box-shadow:0 0 10px rgba(255,0,0,.9);animation:pulse 1.2s infinite}
    @keyframes pulse{0%{transform:scale(1);opacity:1}50%{transform:scale(1.4);opacity:.55}100%{transform:scale(1);opacity:1}}
    .quality-menu{position:absolute;bottom:64px;left:12px;z-index:80;min-width:190px;background:rgba(0,0,0,.82);border:1px solid rgba(255,255,255,.14);border-radius:14px;padding:6px;display:none;pointer-events:auto;backdrop-filter:blur(6px);box-shadow:0 12px 32px rgba(0,0,0,.35)}
    .quality-menu.visible{display:block}
    .quality-item{width:100%;border:none;background:transparent;color:rgba(255,255,255,.92);padding:10px;text-align:right;font-family:'Tajawal',sans-serif;font-size:13px;border-radius:12px;cursor:pointer;display:flex;justify-content:space-between;align-items:center}
    .quality-item:hover,.quality-item.active{background:rgba(255,255,255,.12)}
    .quality-badge{font-size:11px;color:rgba(255,255,255,.6)}
    #liveLabel{position:absolute;bottom:110px;left:50%;transform:translateX(-50%);color:#fff;font-size:14px;background:rgba(0,0,0,.55);padding:6px 10px;border-radius:999px;display:none;pointer-events:none;z-index:90;backdrop-filter:blur(10px)}
    #pipBtn,#fullscreenBtn{display:none!important}
    #castBtn,#rotateBtn{display:flex!important}
  </style>
</head>
<body>
<div id="player-root">
  <div class="player-wrapper" id="playerWrapper">
    <video id="video" playsinline autoplay></video>
    <div class="top-bar" id="topBar">
      <div class="top-top">
        <div class="top-left">
          <button class="top-btn" id="backBtn" title="رجوع"><i data-feather="arrow-right"></i></button>
          <div class="server-strip" id="serverStrip"></div>
        </div>
        <div class="stream-title" id="streamTitle">A Live</div>
      </div>
    </div>

    <div id="loading-spinner"></div>
    <div id="buffer-spinner"></div>

    <div id="error-overlay">
      <i data-feather="alert-triangle"></i>
      <h3 id="error-title">خطأ في المشغل</h3>
      <p id="error-message">تعذر تشغيل الفيديو.</p>
      <button class="retry-btn" id="retryBtn">إعادة التحميل</button>
    </div>

    <div class="controls-overlay" id="controlsOverlay">
      <div class="center-transport" id="centerTransport">
        <div class="circle-btn seek-btn seek-badge" id="rewind5Btn"><i data-feather="rotate-ccw"></i><div class="num">5</div></div>
        <div class="circle-btn big" id="centerPlayPauseBtn"><i data-feather="pause"></i></div>
        <div class="circle-btn seek-btn seek-badge" id="forward15Btn"><i data-feather="rotate-cw"></i><div class="num">15</div></div>
      </div>

      <div class="bottom-bar" id="bottomBar">
        <div class="progress-row">
          <div class="progress-wrapper" id="progressWrapper" tabindex="0">
            <div class="progress-played" id="progressPlayed"></div>
            <div class="progress-thumb" id="progressThumb"></div>
          </div>
        </div>

        <div class="controls-row">
          <div class="icons-row">
            <button class="icon-btn" id="muteBtn"><i data-feather="volume-x"></i></button>
            <button class="icon-btn" id="fitBtn"><i data-feather="maximize-2"></i></button>
            <button class="icon-btn" id="qualityBtn"><i data-feather="settings"></i></button>
            <button class="icon-btn" id="ccBtn"><i data-feather="message-square"></i></button>
            <button class="icon-btn" id="audioLangBtn"><i data-feather="globe"></i></button>
            <button class="icon-btn" id="castBtn"><i data-feather="cast"></i></button>
            <button class="icon-btn" id="pipBtn"><i data-feather="airplay"></i></button>
            <button class="icon-btn" id="fullscreenBtn"><i data-feather="maximize"></i></button>
            <button class="icon-btn" id="rotateBtn"><i data-feather="rotate-cw"></i></button>
          </div>

          <div class="live-task" id="liveTask"><span class="dot"></span>A LIVE</div>
          <div class="time-text" id="timeLabel">00:00 • 00:00</div>
        </div>
      </div>

      <div class="quality-menu" id="qualityMenu"></div>
      <div class="quality-menu" id="subsMenu"></div>
      <div class="quality-menu" id="audioMenu"></div>
      <div id="liveLabel"></div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', async () => {
  feather.replace();

  const video = document.getElementById('video');
  const playerWrapper = document.getElementById('playerWrapper');
  const loadingSpinner = document.getElementById('loading-spinner');
  const bufferSpinner = document.getElementById('buffer-spinner');
  const errorOverlay = document.getElementById('error-overlay');
  const errorTitle = document.getElementById('error-title');
  const errorMessage = document.getElementById('error-message');
  const retryBtn = document.getElementById('retryBtn');
  const bottomBar = document.getElementById('bottomBar');
  const centerTransport = document.getElementById('centerTransport');
  const topBar = document.getElementById("topBar");
  const backBtn = document.getElementById("backBtn");
  const streamTitleEl = document.getElementById("streamTitle");
  const serverStrip = document.getElementById("serverStrip");
  const rewind5Btn = document.getElementById('rewind5Btn');
  const forward15Btn = document.getElementById('forward15Btn');
  const centerPlayPauseBtn = document.getElementById('centerPlayPauseBtn');
  const progressWrapper = document.getElementById('progressWrapper');
  const progressPlayed = document.getElementById('progressPlayed');
  const progressThumb = document.getElementById('progressThumb');
  const timeLabel = document.getElementById('timeLabel');
  const liveTask = document.getElementById("liveTask");
  const muteBtn = document.getElementById('muteBtn');
  const fitBtn = document.getElementById('fitBtn');
  const qualityBtn = document.getElementById('qualityBtn');
  const qualityMenu = document.getElementById('qualityMenu');
  const castBtn = document.getElementById('castBtn');
  const pipBtn = document.getElementById('pipBtn');
  const fullscreenBtn = document.getElementById('fullscreenBtn');
  const rotateBtn = document.getElementById('rotateBtn');
  const ccBtn = document.getElementById('ccBtn');
  const audioLangBtn = document.getElementById('audioLangBtn');
  const subsMenu = document.getElementById('subsMenu');
  const audioMenu = document.getElementById('audioMenu');
  const liveLabel = document.getElementById('liveLabel');

  const WORKER_BASE = "https://ali.albesriali8.workers.dev/";
  let shakaPlayer = null;
  let hls = null;
  let sourceList = [];
  let currentIndex = 0;
  let sourceType = '';
  let availableHeights = [];
  let manualHeight = null;
  let hideTimeout = null;
  let rotated = false;
  let chosenTextLang = null;
  let chosenAudioLang = null;

  const FIT_KEY = 'a_fit_mode';
  const FIT_MODES = [
    { key:'contain', label:'ملاءمة', cls:'fit-contain', icon:'minimize-2' },
    { key:'cover',   label:'قص',     cls:'fit-cover',   icon:'crop' },
    { key:'fill',    label:'تمدد',   cls:'fit-fill',    icon:'maximize-2' }
  ];
  let fitModeIndex = 2;

  function parsePayload(){
    const p = new URLSearchParams(window.location.search);
    const raw = p.get('data');
    if(!raw) return null;
    try { return JSON.parse(decodeURIComponent(raw)); } catch(e) { return null; }
  }

  function buildProxyUrl(src){
    const params = new URLSearchParams();
    params.set('url', src.url || '');
    if (src.userAgent) params.set('ua', src.userAgent);
    if (src.referer) params.set('ref', src.referer);
    if (src.origin) params.set('origin', src.origin);
    return WORKER_BASE + '?' + params.toString();
  }

  function showError(title,msg){
    loadingSpinner.style.display='none';
    bufferSpinner.style.display='none';
    errorTitle.textContent = title;
    errorMessage.textContent = msg;
    errorOverlay.style.display='flex';
    feather.replace();
  }

  function hideError(){ errorOverlay.style.display='none'; }

  function fmt(sec){
    if (!isFinite(sec) || sec < 0) return "00:00";
    const s = Math.floor(sec % 60).toString().padStart(2,'0');
    const m = Math.floor(sec / 60).toString().padStart(2,'0');
    const h = Math.floor(sec / 3600);
    return h > 0 ? h.toString().padStart(2,'0') + ":" + m + ":" + s : m + ":" + s;
  }

  function flashLabel(text){
    liveLabel.textContent = text;
    liveLabel.style.display = 'block';
    setTimeout(()=> liveLabel.style.display='none', 1200);
  }

  function showControls(){
    bottomBar.classList.add('visible');
    centerTransport.classList.add('visible');
    topBar.classList.add('visible');
    clearTimeout(hideTimeout);
    hideTimeout = setTimeout(()=>{
      bottomBar.classList.remove('visible');
      centerTransport.classList.remove('visible');
      topBar.classList.remove('visible');
      qualityMenu.classList.remove('visible');
      subsMenu.classList.remove('visible');
      audioMenu.classList.remove('visible');
    }, 2800);
  }

  function setCenterPlayIcon(){
    const icon = video.paused ? 'play' : 'pause';
    centerPlayPauseBtn.innerHTML = `<i data-feather="${icon}"></i>`;
    feather.replace();
  }

  function updateMuteIcon(){
    const icon = video.muted ? 'volume-x' : 'volume-2';
    muteBtn.innerHTML = `<i data-feather="${icon}"></i>`;
    feather.replace();
  }

  function updateProgress(){
    const cur = video.currentTime || 0;
    const dur = video.duration || 0;
    if (dur > 0 && isFinite(dur)){
      const ratio = (cur / dur) * 100;
      progressPlayed.style.width = ratio + "%";
      progressThumb.style.left = ratio + "%";
      timeLabel.textContent = `${fmt(cur)} • ${fmt(dur)}`;
    } else {
      progressPlayed.style.width = "100%";
      progressThumb.style.left = "100%";
      timeLabel.textContent = "LIVE";
    }
  }

  function destroyEngines(){
    try { if(hls){ hls.destroy(); hls = null; } } catch(e){}
    try { if(shakaPlayer){ shakaPlayer.destroy(); shakaPlayer = null; } } catch(e){}
    video.removeAttribute('src');
    try { video.load(); } catch(e){}
    availableHeights = [];
    manualHeight = null;
  }

  function detectType(url){
    const u = (url || '').toLowerCase();
    if (u.includes('#hls') || u.includes('&type=hls') || u.includes('?type=hls')) return 'hls';
    if (u.includes('.mpd')) return 'dash';
    if (u.includes('.m3u8')) return 'hls';
    if (u.includes('.ts')) return 'ts';
    if (u.includes('.mp4') || u.includes('.mkv') || u.includes('.webm') || u.includes('.mov')) return 'file';
    return 'auto';
  }

  function applyFitModeByIndex(idx){
    fitModeIndex = (idx + FIT_MODES.length) % FIT_MODES.length;
    const m = FIT_MODES[fitModeIndex];
    video.classList.remove('fit-contain','fit-cover','fit-fill');
    video.classList.add(m.cls);
    fitBtn.innerHTML = `<i data-feather="${m.icon}"></i>`;
    feather.replace();
    try { localStorage.setItem(FIT_KEY, m.key); } catch(e){}
    flashLabel(`العرض: ${m.label}`);
  }

  function loadFitMode(){
    let saved = null;
    try { saved = localStorage.getItem(FIT_KEY); } catch(e){}
    const idx = FIT_MODES.findIndex(x => x.key === saved);
    if (idx >= 0) fitModeIndex = idx;
    applyFitModeByIndex(fitModeIndex);
  }

  function cycleFitMode(){ applyFitModeByIndex(fitModeIndex + 1); }

  function parseClearKey(ckString){
    if (!ckString) return null;
    const parts = ckString.split(':');
    if (parts.length !== 2) return null;
    const kid = parts[0].trim().toLowerCase().replace(/-/g,'');
    const key = parts[1].trim().toLowerCase().replace(/-/g,'');
    const hexRe = /^[0-9a-f]+$/;
    if (!hexRe.test(kid) || !hexRe.test(key)) return null;
    return { kid, key };
  }

  function buildServerStrip(){
    serverStrip.innerHTML = '';
    sourceList.forEach((item, i) => {
      const btn = document.createElement('button');
      btn.className = 'server-btn' + (i === currentIndex ? ' active' : '');
      btn.textContent = item.label || ('Server ' + (i + 1));
      btn.onclick = (e) => {
        e.stopPropagation();
        playSelectedSource(i);
      };
      serverStrip.appendChild(btn);
    });
  }

  async function togglePlay(){
    if (video.paused) await video.play().catch(()=>{});
    else video.pause();
    setCenterPlayIcon();
  }

  function seekBy(d){
    const dur = video.duration || 0;
    if (!dur || !isFinite(dur)) return;
    video.currentTime = Math.max(0, (video.currentTime || 0) + d);
  }

  function buildQualityMenu(){
    const baseItems = sourceList.map((src, idx) => ({
      label: src.label || ('Server ' + (idx + 1)),
      action: 'source',
      index: idx,
      active: idx === currentIndex
    }));

    const qualityItems = sourceType === 'dash'
      ? [
          { label:'تلقائي (Auto)', action:'quality', height:null, active: manualHeight === null },
          ...availableHeights.map(h => ({
            label:`${h}p`,
            action:'quality',
            height:h,
            active: manualHeight === h
          }))
        ]
      : [];

    const items = [...baseItems, ...qualityItems];
    qualityMenu.innerHTML = items.map(it => {
      if (it.action === 'source') {
        return `<button class="quality-item ${it.active ? 'active' : ''}" data-action="source" data-index="${it.index}">
          <span>${it.label}</span><span class="quality-badge">سيرفر</span></button>`;
      }
      return `<button class="quality-item ${it.active ? 'active' : ''}" data-action="quality" data-height="${it.height === null ? '' : it.height}">
        <span>${it.label}</span><span class="quality-badge">جودة</span></button>`;
      }).join('');

    qualityMenu.querySelectorAll('.quality-item').forEach(btn => {
      btn.addEventListener('click', async (e) => {
        e.stopPropagation();
        const action = btn.getAttribute('data-action');
        if (action === 'source') {
          const i = parseInt(btn.getAttribute('data-index'), 10);
          await playSelectedSource(i);
        } else {
          const hAttr = btn.getAttribute('data-height');
          const h = hAttr === '' ? null : parseInt(hAttr, 10);
          await setQuality(h);
        }
        qualityMenu.classList.remove('visible');
        showControls();
      });
    });
  }

  async function refreshAvailableQualities(){
    availableHeights = [];
    if (sourceType === 'dash' && shakaPlayer) {
      const variants = shakaPlayer.getVariantTracks().filter(t => t.type === 'variant' && t.height).sort((a,b)=> b.height - a.height);
      const heights = [];
      for (const v of variants) if (!heights.includes(v.height)) heights.push(v.height);
      availableHeights = heights;
    }
    buildQualityMenu();
  }

  async function setQuality(heightOrNull){
    if (sourceType === 'dash' && shakaPlayer) {
      if (heightOrNull === null) {
        manualHeight = null;
        shakaPlayer.configure({ abr: { enabled:true } });
        buildQualityMenu();
        flashLabel('الجودة: تلقائي');
        return;
      }
      manualHeight = heightOrNull;
      shakaPlayer.configure({ abr: { enabled:false } });
      const tracks = shakaPlayer.getVariantTracks().filter(t => t.height === heightOrNull).sort((a,b)=> (b.bandwidth||0) - (a.bandwidth||0));
      if (tracks.length) {
        shakaPlayer.selectVariantTrack(tracks[0], true);
        flashLabel(`الجودة: ${heightOrNull}p`);
      }
      buildQualityMenu();
      return;
    }
    flashLabel('الجودة حسب السيرفر');
  }

  async function buildSubsMenu(){
    if (!shakaPlayer) {
      subsMenu.innerHTML = '<button class="quality-item active"><span>غير مدعوم لهذا النوع</span></button>';
      return;
    }
    const tracks = shakaPlayer.getTextTracks?.() || [];
    const visible = shakaPlayer.isTextTrackVisible?.() || false;
    const items = [{ label:'إيقاف الترجمة', lang:null, active:!visible },
      ...tracks.map(t => ({ label:`ترجمة: ${(t.language||'und').toUpperCase()}`, lang:t.language||'', active: visible && (chosenTextLang||'') === (t.language||'') }))
    ];
    subsMenu.innerHTML = items.map(it=>`<button class="quality-item ${it.active?'active':''}" data-lang="${it.lang ?? ''}"><span>${it.label}</span></button>`).join('');
    subsMenu.querySelectorAll('.quality-item').forEach(btn=>btn.addEventListener('click',(e)=>{
      e.stopPropagation();
      const lang = btn.getAttribute('data-lang');
      if (!lang) {
        shakaPlayer.setTextTrackVisibility(false);
        chosenTextLang = null;
        flashLabel('الترجمة: إيقاف');
      } else {
        const tracks2 = shakaPlayer.getTextTracks?.() || [];
        const wanted = tracks2.find(t => (t.language||'') === lang) || tracks2[0];
        if (wanted) {
          shakaPlayer.selectTextTrack(wanted);
          shakaPlayer.setTextTrackVisibility(true);
          chosenTextLang = wanted.language;
          flashLabel(`الترجمة: ${(wanted.language||'und').toUpperCase()}`);
        }
      }
      subsMenu.classList.remove('visible');
      showControls();
    }));
  }

  async function buildAudioMenu(){
    if (!shakaPlayer) {
      audioMenu.innerHTML = '<button class="quality-item active"><span>غير مدعوم لهذا النوع</span></button>';
      return;
    }
    const vars = shakaPlayer.getVariantTracks?.() || [];
    const langs = [];
    for (const v of vars) {
      const L = (v.language || '').toLowerCase();
      if (L && !langs.includes(L)) langs.push(L);
    }
    if (!langs.length) {
      audioMenu.innerHTML = '<button class="quality-item active"><span>لا توجد لغات صوت متعددة</span></button>';
      return;
    }
    audioMenu.innerHTML = langs.map(l=>`<button class="quality-item ${chosenAudioLang===l?'active':''}" data-alang="${l}"><span>صوت: ${l.toUpperCase()}</span></button>`).join('');
    audioMenu.querySelectorAll('.quality-item').forEach(btn=>btn.addEventListener('click', async (e)=>{
      e.stopPropagation();
      const alang = btn.getAttribute('data-alang');
      chosenAudioLang = alang;
      shakaPlayer.configure({ preferredAudioLanguage: alang });
      const vars2 = shakaPlayer.getVariantTracks?.() || [];
      const cand = vars2.filter(v => (v.language||'').toLowerCase() === alang).sort((a,b)=> (b.bandwidth||0) - (a.bandwidth||0));
      if (cand.length) {
        shakaPlayer.selectVariantTrack(cand[0], true);
        flashLabel(`الصوت: ${alang.toUpperCase()}`);
      }
      audioMenu.classList.remove('visible');
      showControls();
    }));
  }

  function applyLiveUI(){
    const isLive = !isFinite(video.duration) || (sourceType !== 'file' && (video.duration === Infinity || Number.isNaN(video.duration)));
    if (isLive) {
      liveTask.style.display = "flex";
      timeLabel.style.display = "none";
      rewind5Btn.style.opacity = ".45";
      forward15Btn.style.opacity = ".45";
      progressWrapper.style.opacity = ".5";
    } else {
      liveTask.style.display = "none";
      timeLabel.style.display = "block";
      rewind5Btn.style.opacity = "1";
      forward15Btn.style.opacity = "1";
      progressWrapper.style.opacity = "1";
    }
  }

  async function playSelectedSource(index){
    const src = sourceList[index];
    if (!src || !src.url) {
      showError('رابط غير موجود', 'لا يوجد رابط لهذا السيرفر.');
      return;
    }
    currentIndex = index;
    buildServerStrip();
    buildQualityMenu();
    hideError();

    const url = src.url;
    sourceType = detectType(url);
    streamTitleEl.textContent = payload.title || 'A Live';
    loadingSpinner.style.display = 'block';
    bufferSpinner.style.display = 'none';
    destroyEngines();

    try {
      if (sourceType === 'dash') {
        shaka.polyfill.installAll();
        if (!shaka.Player.isBrowserSupported()) throw new Error('المتصفح لا يدعم DASH');

        shakaPlayer = new shaka.Player(video);
        shakaPlayer.addEventListener('error', (event)=> {
          const msg = event.detail?.message || JSON.stringify(event.detail) || 'خطأ في DASH';
          showError('خطأ في Shaka', msg);
        });

        const engine = shakaPlayer.getNetworkingEngine();
        if (engine) {
          engine.registerRequestFilter((reqType, request) => {
            if (src.userAgent) request.headers['User-Agent'] = src.userAgent;
            if (src.referer) request.headers['Referer'] = src.referer;
            if (src.origin) request.headers['Origin'] = src.origin;
          });
        }

        const ckParsed = parseClearKey(src.drmKey || '');
        if (ckParsed) {
          shakaPlayer.configure({ drm: { clearKeys: { [ckParsed.kid]: ckParsed.key } } });
        }

        await shakaPlayer.load(buildProxyUrl(src));
        await refreshAvailableQualities();
        await video.play().catch(()=>{});
      } else if (sourceType === 'hls' || sourceType === 'auto') {
        const proxiedUrl = buildProxyUrl(src);
        if (video.canPlayType('application/vnd.apple.mpegurl')) {
          video.src = proxiedUrl;
          video.load();
          await video.play().catch(()=>{});
        } else if (window.Hls && Hls.isSupported()) {
          hls = new Hls({ enableWorker: true, lowLatencyMode: true });
          hls.loadSource(proxiedUrl);
          hls.attachMedia(video);
          await new Promise((resolve, reject) => {
            hls.on(Hls.Events.MANIFEST_PARSED, resolve);
            hls.on(Hls.Events.ERROR, (event, data) => {
              if (data.fatal) reject(new Error('فشل تشغيل HLS'));
            });
          });
          await video.play().catch(()=>{});
        } else {
          video.src = proxiedUrl;
          video.load();
          await video.play().catch(()=>{});
        }
        availableHeights = [];
        buildQualityMenu();
      } else {
        const finalUrl = buildProxyUrl(src);
        video.src = finalUrl;
        video.load();
        await video.play().catch(()=>{});
        availableHeights = [];
        buildQualityMenu();
      }

      loadingSpinner.style.display = 'none';
      updateMuteIcon();
      setCenterPlayIcon();
      applyLiveUI();
      showControls();
      flashLabel(`تم تشغيل ${src.label || 'السيرفر'}`);
    } catch(err) {
      loadingSpinner.style.display = 'none';
      showError('فشل التحميل', err?.message || String(err));
    }
  }

  function toggleRotate(){
    rotated = !rotated;
    if(rotated){
      video.style.transform = 'rotate(90deg) scale(1.02)';
      video.style.transformOrigin = 'center center';
      flashLabel('تم تفعيل التدوير');
    } else {
      video.style.transform = '';
      video.style.transformOrigin = '';
      flashLabel('تم إيقاف التدوير');
    }
  }

  playerWrapper.addEventListener('click', (e)=>{
    showControls();
    if (!qualityMenu.contains(e.target) && e.target !== qualityBtn) qualityMenu.classList.remove('visible');
    if (!subsMenu.contains(e.target) && e.target !== ccBtn) subsMenu.classList.remove('visible');
    if (!audioMenu.contains(e.target) && e.target !== audioLangBtn) audioMenu.classList.remove('visible');
  });

  rewind5Btn.addEventListener('click', (e)=>{ e.stopPropagation(); seekBy(-5); showControls(); });
  forward15Btn.addEventListener('click', (e)=>{ e.stopPropagation(); seekBy(15); showControls(); });
  centerPlayPauseBtn.addEventListener('click', (e)=>{ e.stopPropagation(); togglePlay(); showControls(); });
  progressWrapper.addEventListener('click', (e)=>{
    const dur = video.duration || 0;
    if (!(dur > 0 && isFinite(dur))) return;
    const rect = progressWrapper.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    video.currentTime = Math.max(0, Math.min(dur, ratio * dur));
    showControls();
  });
  qualityBtn.addEventListener('click', (e)=>{ e.stopPropagation(); subsMenu.classList.remove('visible'); audioMenu.classList.remove('visible'); qualityMenu.classList.toggle('visible'); showControls(); });
  fitBtn.addEventListener('click', (e)=>{ e.stopPropagation(); cycleFitMode(); showControls(); });
  ccBtn.addEventListener('click', async (e)=>{ e.stopPropagation(); qualityMenu.classList.remove('visible'); audioMenu.classList.remove('visible'); await buildSubsMenu(); subsMenu.classList.toggle('visible'); showControls(); });
  audioLangBtn.addEventListener('click', async (e)=>{ e.stopPropagation(); qualityMenu.classList.remove('visible'); subsMenu.classList.remove('visible'); await buildAudioMenu(); audioMenu.classList.toggle('visible'); showControls(); });
  muteBtn.addEventListener('click', async (e)=>{ e.stopPropagation(); video.muted = !video.muted; updateMuteIcon(); flashLabel(video.muted ? 'الصوت: كتم' : 'الصوت: تشغيل'); showControls(); });
  castBtn.addEventListener('click', (e)=>{ e.stopPropagation(); flashLabel('ميزة Cast ستتوفر هنا'); showControls(); });
  pipBtn.addEventListener('click', (e)=>{ e.stopPropagation(); flashLabel('PiP غير مفعل'); showControls(); });
  fullscreenBtn.addEventListener('click', (e)=>{ e.stopPropagation(); showControls(); });
  rotateBtn.addEventListener('click', (e)=>{ e.stopPropagation(); toggleRotate(); showControls(); });
  backBtn.addEventListener('click', (e)=>{ e.stopPropagation(); history.back(); });
  retryBtn.addEventListener('click', async ()=>{ hideError(); await playSelectedSource(currentIndex); });

  video.addEventListener('timeupdate', updateProgress);
  video.addEventListener('loadedmetadata', ()=>{ updateProgress(); applyLiveUI(); });
  video.addEventListener('play', ()=>{ setCenterPlayIcon(); showControls(); });
  video.addEventListener('pause', ()=>{ setCenterPlayIcon(); showControls(); });
  video.addEventListener('waiting', ()=>{ bufferSpinner.style.display='block'; });
  video.addEventListener('playing', ()=>{ bufferSpinner.style.display='none'; });
  video.addEventListener('error', ()=> showError('خطأ في الفيديو', 'تعذر تشغيل الفيديو.'));

  const payload = parsePayload();
  updateMuteIcon();
  setCenterPlayIcon();
  updateProgress();
  loadFitMode();
  showControls();

  if (!payload || !Array.isArray(payload.qualities) || !payload.qualities.length) {
    showError('لا توجد بيانات', 'افتح المشغل من بطاقة المباراة.');
    return;
  }

  streamTitleEl.textContent = payload.title || 'A Live';
  sourceList = payload.qualities.filter(q => q && q.url && q.url.trim() !== '');
  currentIndex = Number(payload.defaultIndex || 0);
  if (currentIndex >= sourceList.length) currentIndex = 0;

  buildServerStrip();
  buildQualityMenu();
  await playSelectedSource(currentIndex);
});
</script>
</body>
</html>
