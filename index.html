<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>مكتبة الأفلام والمسلسلات | البصري TV</title>
    <meta name="description" content="استعرض أحدث الأفلام والمسلسلات الحصرية على منصة البصري تي في. واجهة سريعة ومتجاوبة.">
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg: #030712;
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text-main: #ffffff;
            --text-dim: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; transition: 0.3s ease; }

        body {
            font-family: 'Cairo', sans-serif;
            background: var(--bg);
            background: radial-gradient(circle at center, #0b214d 0%, #030712 100%);
            color: var(--text-main);
            min-height: 100vh;
            padding: 20px;
        }

        .header-nav {
            max-width: 1200px;
            margin: 0 auto 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 25px;
            background: var(--glass);
            backdrop-filter: blur(15px);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .back-btn {
            text-decoration: none;
            color: var(--text-main);
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .back-btn:hover { color: var(--primary); }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h2 { text-align: center; margin-bottom: 30px; color: var(--primary); font-weight: 900; }

        /* شبكة الأفلام */
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 20px;
        }

        .movie-card {
            background: var(--glass);
            border-radius: 20px;
            border: 1px solid var(--border);
            overflow: hidden;
            position: relative;
            cursor: pointer;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0, 210, 255, 0.2);
        }

        .movie-card img {
            width: 100%;
            height: 260px;
            object-fit: cover;
        }

        .movie-info {
            padding: 12px;
            text-align: center;
        }

        .movie-info h3 { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
        .movie-info span { font-size: 12px; color: var(--text-dim); }

        .quality-tag {
            position: absolute;
            top: 10px;
            right: 10px;
            background: var(--primary);
            color: #000;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 10px;
            font-weight: bold;
        }

        footer {
            text-align: center;
            margin-top: 50px;
            padding: 20px;
            font-size: 12px;
            color: var(--text-dim);
            border-top: 1px solid var(--border);
        }

        @media (max-width: 480px) {
            .movies-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .movie-card img { height: 200px; }
        }
    </style>
</head>
<body>

<div class="header-nav">
    <a href="index.html" class="back-btn"><i class="fas fa-arrow-right"></i> العودة للرئيسية</a>
    <div style="font-weight: 900; color: var(--primary);">ALBASRI TV</div>
</div>

<div class="container">
    <h2><i class="fas fa-film"></i> مكتبة الأفلام والمسلسلات</h2>

    <div class="movies-grid">
        <div class="movie-card" onclick="location.href='bsr_player.html?id=1'">
            <span class="quality-tag">4K</span>
            <img src="https://via.placeholder.com/300x450" alt="اسم الفيلم">
            <div class="movie-info">
                <h3>اسم الفيلم القادم</h3>
                <span>أكشن | 2026</span>
            </div>
        </div>

        <div class="movie-card" onclick="location.href='bsr_player.html?id=2'">
            <span class="quality-tag">FHD</span>
            <img src="https://via.placeholder.com/300x450" alt="اسم الفيلم">
            <div class="movie-info">
                <h3>مسلسل درامي جديد</h3>
                <span>دراما | 2026</span>
            </div>
        </div>

        </div>
</div>

<footer>
    تطوير وبرمجة: علي يعقوب (ROMEO) &copy; 2026
</footer>

</body>
</html>
